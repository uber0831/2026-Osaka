<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka 2026</title>
    
    <link rel="apple-touch-icon" href="https://i.imgur.com/uR2N8Z0.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="大阪行程">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #FDFCFB; color: #333; line-height: 1.5; }
        .day-title { background: #8D6E63; color: white; padding: 8px 20px; border-radius: 12px; font-weight: 900; font-size: 19px; box-shadow: 0 3px 5px rgba(0,0,0,0.1); margin-bottom: 12px; display: inline-block; }
        .day-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 0 6px 20px rgba(141, 110, 99, 0.08); border: 1px solid #F1EAE0; margin-bottom: 24px; }
        
        /* 📍 行程文字：加大加粗 */
        .event-text { font-size: 20px; font-weight: 900; color: #1F2937; margin-top: 6px; letter-spacing: -0.5px; }
        
        /* 💊 藥品文字：縮小 */
        .med-pill span { font-size: 15px; font-weight: 700; color: #702424; }
        .med-pill { background: #FFF5F5; border: 1.5px solid #FEE2E2; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .med-pill.done { background: #F3F4F6; border-color: #E5E7EB; opacity: 0.5; }

        /* 🍱 三餐資訊：加大加粗並優化視覺 */
        .meal-info { margin-top: 15px; padding: 12px; background: #F9F5F2; border-radius: 16px; font-size: 17px; font-weight: 800; color: #5D4037; }
        .meal-item b { color: #8D6E63; font-weight: 900; margin-right: 4px; }

        .period-box { position: relative; padding-left: 35px; margin-bottom: 20px; border-left: 2px dashed #D1D5DB; margin-left: 12px; }
        .period-icon { position: absolute; left: -14px; top: 0; background: white; padding: 4px; font-size: 18px; }
        .period-label { font-size: 12px; font-weight: 900; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="mb-8">
        <h1 class="text-2xl font-black text-[#5D4037]">🌸 Osaka 2026</h1>
    </header>

    <div class="day-title">3/26 (四)</div>
    <div class="day-card">
        <div class="period-box">
            <i class="fa-solid fa-plane period-icon text-blue-400"></i>
            <span class="period-label">Morning</span>
            <div class="flex flex-wrap gap-2 mt-2">
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>益斯德 x3</span></div>
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>快孕隆 x1</span></div>
            </div>
            <p class="event-text">09:00 桃園機場 - 12:30 關西機場</p>
        </div>
        <div class="period-box">
            <i class="fa-solid fa-moon period-icon text-indigo-400"></i>
            <span class="period-label">Evening</span>
            <div class="flex flex-wrap gap-2 mt-2">
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>益斯德 x3</span></div>
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>大白球 x2</span></div>
            </div>
            <p class="event-text">Life超市 / 唐吉購物</p>
        </div>
        <div class="meal-info">
            <b>早：</b>機場解決 | <b>午：</b>待定 | <b>晚：</b>待定
        </div>
    </div>

    <div class="day-title">3/27 (五)</div>
    <div class="day-card">
        <div class="period-box">
            <i class="fa-solid fa-utensils period-icon text-red-400"></i>
            <span class="period-label">Morning</span>
            <div class="flex flex-wrap gap-2 mt-2">
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>益斯德 x3</span></div>
                <div class="med-pill" onclick="toggleMed(this)"><i class="fa-regular fa-circle"></i><span>快孕隆 x1</span></div>
            </div>
            <p class="event-text">11:30 梅田敘敘苑 (已預約)</p>
        </div>
        <div class="meal-info">
            <b>早：</b>待定 | <b>午：</b>敘敘苑 | <b>晚：</b>朋友聚餐
        </div>
    </div>

    <script>
        function toggleMed(element) {
            element.classList.toggle('done');
            const icon = element.querySelector('i');
            icon.className = element.classList.contains('done') ? 'fa-solid fa-circle-check text-green-500' : 'fa-regular fa-circle';
        }
    </script>
</body>
</html>
