<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kansai Journey Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義字體與基礎樣式 */
        body { 
            font-family: "PingFang TC", "Heiti TC", "Noto Sans TC", sans-serif;
            background-color: #FAF8F5; /* 柔和杏色背景 */
            color: #5D4037; /* 深咖啡色文字，比純黑柔和 */
            -webkit-font-smoothing: antialiased;
        }
        
        /* 卡片樣式 */
        .note-card {
            background-color: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(93, 64, 55, 0.04); /* 極淡的深色陰影 */
            border: 1px solid #F1EAE0;
        }

        /* 自定義 Checkbox 樣式 */
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #A1887F; /* 柔和的棕色 */
            border: 1px solid #D7CCC8;
            border-radius: 4px;
        }

        /* 導航按鈕樣式 */
        .map-btn {
            background-color: #A1887F; /* 柔和棕色 */
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 12px;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .map-btn:active {
            background-color: #8D6E63;
        }

        /* 移除標籤頁背景，保持極簡 */
        .active-tab {
            color: #A1887F !important;
            font-weight: 600;
        }
    </style>
</head>
<body class="pb-28">

    <div class="p-6 pt-10 border-b border-[#F1EAE0]">
        <h1 class="text-2xl font-medium tracking-tight">旅途記事</h1>
        <p class="text-sm text-[#8D6E63] mt-1">關西．2026</p>
    </div>

    <div class="p-5 space-y-6">
        
        <div class="p-4 bg-white border border-[#F1EAE0] rounded-xl text-sm text-[#8D6E63] italic">
            「放慢腳步，保持心情愉悅，一切都會順利的。」
        </div>

        <div class="note-card p-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-lg font-semibold text-[#5D4037]">28 (五)</h2>
                    <p class="text-xs text-[#A1887F] font-medium tracking-wide mt-1">重要
