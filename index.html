<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 好運好孕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: "PingFang TC", sans-serif; background-color: #FAF8F5; color: #4A3E3E; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .day-btn { padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #A1887F; border: 1px solid transparent; transition: 0.3s; white-space: nowrap; }
        .day-btn.active { background: white; color: #5D4037; border-color: #F1EAE0; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(93, 64, 55, 0.04); margin-bottom: 16px; border: 1px solid #F1EAE0; }
        .flight-tag { background: #F8F6F4; border-radius: 12px; padding: 12px; font-size: 13px; margin-bottom: 15px; border: 1px dashed #D7CCC8; }
        .action-btn { background: #A1887F; color: white; border-radius: 12px; padding: 12px; width: 100%; text-align: center; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body class="pb-24">

    <div id="injection-alert" class="hidden fixed top-4 left-4 right-4 z-50 bg-white border-l-4 border-red-400 p-4 rounded-xl shadow-2xl">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-syringe text-red-500 text-xl"></i>
            <div><p class="text-sm font-bold">今日重要：打針日</p><p class="text-xs text-gray-400 italic font-medium">按時完成喔，加油 💪</p></div>
        </div>
    </div>

    <header class="p-6 pt-12">
        <h1 class="text-2xl font-bold text-[#5D4037] mb-4">旅途記事</h1>
        <div class="flex overflow-x-auto gap-2 pb-2 scrollbar-hide" id="tab-list">
            <button class="day-btn active" onclick="openDay(event, 'day26')">3/26</button>
            <button class="day-btn" onclick="openDay(event, 'day27')">3/27</button>
            <button class="day-btn" onclick="openDay(event, 'day28')">3/28</button>
            <button class="day-btn" onclick="openDay(event, 'day29')">3/29</button>
            <button class="day-btn" onclick="openDay(event, 'day30')">3/30</button>
            <button class="day-btn" onclick="openDay(event, 'day31')">3/31</button>
        </div>
    </header>

    <main class="px-5">
        <div id="day26" class="tab-content active">
            <div class="card">
                <span class="text-xs font-bold text-[#A1887F] block mb-2 uppercase">Arrival Day</span>
                <div class="flight-tag">
                    <div class="flex justify-between font-bold"><span>✈️ 泰國獅航 SL396</span><span class="text-blue-500">KIX T1</span></div>
                    <div class="flex justify-between text-xs text-gray-400 mt-2"><span>09:00 TPE</span><i class="fa-solid fa-arrow-right"></i><span>12:30 KIX</span></div>
                </div>
                <ul class="space-y-3 text-sm">
                    <li><i class="fa-solid fa-hotel mr-2 opacity-50"></i> 14:00-15:00 抵達阿倍野</li>
                    <li><i class="fa-solid fa-utensils mr-2 opacity-50"></i> 一蘭拉麵 / Q's Mall</li>
                    <li><i class="fa-solid fa-cart-shopping mr-2 opacity-50"></i> Life 超市買水果</li>
                </ul>
            </div>
        </div>

        <div id="day27" class="tab-content">
            <div class="card">
                <h3 class="font-bold mb-4">市區散步</h3>
                <p class="text-sm text-gray-500">放鬆行程，可前往附近咖啡廳或商店街散策。</p>
            </div>
        </div>

        <div id="day28" class="tab-content">
            <div class="card border-l-4 border-red-300">
                <h3 class="font-bold text-red-600 mb-2">第一次打針日</h3>
                <p class="text-sm text-gray-500 mb-4 italic">※ 心情放鬆，一切順利。</p>
                <div class="p-3 bg-red-50 rounded-lg text-xs text-red-800">打針完可去阿倍野 Harukas 欣賞美景放鬆。</div>
            </div>
        </div>

        <div id="day29" class="tab-content">
            <div class="card">
                <h3 class="font-bold mb-4 text-[#8D6E63]">門真戰鬥購物日</h3>
                <div class="space-y-2 text-sm">
                    <label class="flex items-center gap-3"><input type="checkbox"> Costco 門真店</label>
                    <label class="flex items-center gap-3"><input type="checkbox"> Outlet / Lalaport</label>
                    <label class="flex items-center gap-3"><input type="checkbox"> coca / Loft / Muji</label>
                </div>
                <button onclick="window.open('https://www.google.com/maps/search/門真+Costco8')" class="action-btn">導航至門真購物中心</button>
            </div>
        </div>

        <div id="day30"
