<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Trip 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Lexend', 'Noto Sans TC', sans-serif; background: #F9FAFB; color: #374151; }
        .app-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #F3F4F6; margin-bottom: 16px; transition: transform 0.2s; }
        .app-card:active { transform: scale(0.98); }
        .icon-circle { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F9FAFB; cursor: pointer; }
        .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #8D6E63; border-radius: 4px; }
        .flight-progress { position: relative; height: 4px; background: #E5E7EB; border-radius: 2px; margin: 20px 0; }
        .plane-icon { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); color: #8D6E63; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 pt-12 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">Osaka Trip</h1>
            <p class="text-sm text-gray-400 mt-1 font-medium italic">Ready for Good Luck ✨</p>
        </div>
        <div class="text-right">
            <div class="bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 flex items-center gap-2">
                <i class="fa-solid fa-cloud-sun text-yellow-500 text-xs"></i>
                <span class="text-xs font-bold text-gray-600">Osaka 18°C</span>
            </div>
        </div>
    </header>

    <main class="px-5">

        <div class="app-card">
            <div class="flex justify-between items-center mb-4">
                <span class="status-pill bg-blue-50 text-blue-600">Day 1 • 03.26</span>
                <i class="fa-solid fa-plane-arrival text-blue-200 text-xl"></i>
            </div>
            <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
                <span>09:00 TPE</span>
                <span>SL396</span>
                <span>12:30 KIX</span>
            </div>
            <div class="flight-progress"><i class="fa-solid fa-plane plane-icon"></i></div>
            
            <div class="mt-6 space-y-4">
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                    <div class="icon-circle bg-white shadow-sm"><i class="fa-solid fa-house-user text-green-500"></i></div>
                    <div>
                        <p class="text-sm font-bold">住一新今宫 1 号店</p>
                        <p class="text-[10px] text-gray-400">搭乘南海電鐵直達市區</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="check-item"><input type="checkbox"> <span class="text-xs">Life 超市</span></div>
                    <div class="check-item"><input type="checkbox"> <span class="text-xs">唐吉訶德</span></div>
                    <div class="check-item"><input type="checkbox"> <span class="text-xs">Lawson 炸雞</span></div>
                    <div class="check-item"><input type="checkbox"> <span class="text-xs">一蘭拉麵</span></div>
                </div>
            </div>
        </div>

        <div class="app-card">
            <div class="flex justify-between items-center mb-4">
                <span class="status-pill bg-orange-50 text-orange-600">Day 2 • 03.27</span>
                <i class="fa-solid fa-utensils text-orange-200"></i>
            </div>
            <div class="flex items-center gap-4 mb-4">
                <div class="icon-circle bg-orange-100"><i class="fa
