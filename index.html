<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 好孕關西行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #F8F9FA; color: #333; }
        .day-header { background: #8D6E63; color: white; padding: 12px 20px; border-radius: 15px; font-weight: bold; margin: 20px 0 10px 0; display: inline-block; font-size: 14px; box-shadow: 0 4px 10px rgba(141, 110, 99, 0.2); }
        .info-card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #EEE; margin-bottom: 15px; }
        .detail-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 14px; line-height: 1.5; }
        .icon-box { min-width: 24px; text-align: center; color: #8D6E63; margin-top: 3px; }
        .tag { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-right: 5px; }
        .tag-transport { background: #E3F2FD; color: #1976D2; }
        .tag-food { background: #FFF3E0; color: #E65100; }
        .tag-medical { background: #FFEBEE; color: #D32F2F; }
        .price-text { font-family: monospace; color: #666; font-size: 12px; font-weight: bold; }
        /* 勾選框專用樣式 */
        .check-task { cursor: pointer; transition: all 0.3s; padding: 10px; border-radius: 12px; }
        .check-task.completed { background-color: #F0FDF4; opacity: 0.6; }
        .check-task.completed p { text-decoration: line-through; color: #9CA3AF; }
        .check-task i.fa-square { color: #D1D5DB; }
        .check-task i.fa-square-check { color: #22C55E; }
    </style>
</head>
<body class="p-5 pb-20">

    <header class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">2026 大阪行程表</h1>
        <p class="text-xs text-gray-400 mt-1">Ready for Good Luck ✨</p>
    </header>
